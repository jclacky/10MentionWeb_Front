<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="description" content="Ma seconde page HTML">
    <!-- Cette balise meta avec la valeur description de l'attribut name fournit une courte description de la page. Cela peut etre utilisé par les moteurs de recherche pour afficher un extrait de description sous un lien vers la page dans les resultats de recherche (le SERP)-->
    <meta name="author" content="Cleid Manigat">
    <!-- Cette balise meta avec la valeur author de l'attribut name spécifie l'auteur de la page.
            Elle peut etre utilisée pour indiquer qui a crée le contenue de la page
    -->
    <title> Balises de texte et CSS </title> 
</head>
<body>
    
    <!-- Les balises HTML peuvent etre classées en deux types principaux:
        
            - Les balises en ligne (inline)
            - Les balises en block ( block)
        Ces catégories décrivent comment les éléments HTML s'affichent et intèragissent avec les éléments qui les entourent.
    -->

    <!--
        Un élément de type ligne : 
            - n'est pas précédé ou suivi d'un qsaut de ligne 
            - ne peut avoir de taille définie.
    -->

    <!-- 
        Un élément de type block:
            - est toujours précédé ou suivi d'un saut de ligne 
            - peut avoir une taille défini => il occupe toute la largeur (de la page ) disponible 
    -->

    <h1> Ma première page web</h1>
        <!-- La balise <h1> est une balise html utilisée pour definir un titre de premier niveau  dans une page web. Le h dans h1 signifi header et 1  indique que c'est le titre de plus haut niveau dans la hiérarchie des titres. 
            
            En HTML les balises de titre vont de h1 à h6 ou h1 est le 1er nivauu et h6 le dernier 
            Chaque niveau de titre répresente une hiérarchie, et les titres sont utilisées pour organiser et stucturer le contenu de la page.
            Les titres sont des éléments de types bloc : suivies-->
    <h2> Bienvenue </h2>
    <h3>Titre de niveau 3</h3>
    <h4>Titre de niveau 4</h4>
    <h5>Titre de niveau 5</h5>
    <h6>Titre de niveau 6</h6>
</body>
</html>
