<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Les tableaux en HTML">
    <meta name="author" content="Cleid M">
    <link rel="stylesheet" href="assets/css/08_les_tableaux.css">
    <title>Document</title>
</head>
<body>
    
     <h1> Un tableay pour bles données "tabulaires"</h1>
     <table>
        <!-- La balise table définit le début d'un tableau -->
        <caption>  
            <!-- Titre du tableau (lr légende) -->
            vente de la semaine 
        </caption>
        <thead>   
            <!-- l'en_tête du tableau -->
            <tr>
                <!-- table row : rangée du tableau -->

                <th>Jour</th>
                <th>Smartphones</th>
                <th>Tablettes</th>
                <th>Ordinateurs</th>
            </tr>
        </thead>
        <tbody>
            <!-- le corp du tableau -->
            <tr> 
                <!-- td : table data ==> cellules de tableau ==> colonnes -->
                <td> Lundi</td>
                <td>10</td>
                <td>5</td>
                <td>12</td>
            </tr>
            <tr>
                <td> Mardi </td>
                <td>11</td>
                <td>9</td>
                <td>6</td>
            </tr>
            <tr>
                <td> Mercredi </td>
                <td>14</td>
                <td>6</td>
                <td>7</td>
            </tr>
            <tr>
                <td> Jeudi </td>
                <td>13</td>
                <td>10</td>
                <td>2</td>
            </tr>
            <tr>
                <td> Vendredi </td>
                <td>15</td>
                <td>10</td>
                <td>3</td>
            </tr>
        </tbody >
        <tfoot>
            <!-- tfoot: table foot ==> le pied du tableau-->
             <tr>
                <td>Total</td>
                <td>80</td>
                <td>90</td>
                <td>70</td>
             </tr>
        </tfoot>
     </table>





</body>
</html>
